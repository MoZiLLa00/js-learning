<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Блок 6: Интерактивный список задач</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Список задач</h1>

      <!-- Форма добавления -->
      <form id="task-form" class="task-form">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="Новая задача..."
          required
          autocomplete="off"
        />
        <button type="submit" class="btn btn-primary">Добавить</button>
      </form>

      <!-- Фильтры -->
      <div class="filters">
        <button data-filter="all" class="btn btn-filter active">Все</button>
        <button data-filter="active" class="btn btn-filter">Активные</button>
        <button data-filter="done" class="btn btn-filter">Выполненные</button>
      </div>

      <!-- Список задач (заполняется через JS) -->
      <ul id="task-list" class="task-list"></ul>

      <!-- Счётчик -->
      <p class="counter">Осталось задач: <span id="counter-value">0</span></p>
    </main>

    <!-- defer гарантирует, что DOM уже построен до запуска скрипта -->
    <script src="script.js" defer></script>
  </body>
</html>
