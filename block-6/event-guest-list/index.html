<!-- index.html -->
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Блок 6: Список гостей</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Управление гостями</h1>

      <form id="guest-form">
        <input
          type="text"
          id="name-input"
          placeholder="Имя гостя"
          required
          autocomplete="off"
        />
        <select id="role-select">
          <option value="Спикер">Спикер</option>
          <option value="Гость">Гость</option>
          <option value="Организатор">Организатор</option>
        </select>
        <button type="submit">Добавить</button>
      </form>

      <div class="filters">
        <button data-role="all" class="btn btn active">Все</button>
        <button data-role="Спикер">Спикеры</button>
        <button data-role="Гость">Гости</button>
      </div>

      <ul id="guest-list"></ul>
      <p class="counter">Присутствует: <span id="present-count">0</span></p>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
