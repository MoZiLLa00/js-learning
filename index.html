<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio App</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Менеджер задач</h1>
      <form id="task-form">
        <input
          type="text"
          id="task-input"
          placeholder="Новая задача..."
          required
          autocomplete="off"
        />
        <select id="priority-select">
          <option value="high">Высокий</option>
          <option value="medium" selected>Средний</option>
          <option value="low">Низкий</option>
        </select>
        <button type="submit">Добавить</button>
      </form>
      <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #e2e8f0" />
      <h2>Последние посты</h2>
      <button id="load-posts-btn">Загрузить посты</button>
      <div id="posts-status" class="status"></div>
      <ul id="posts-list" class="posts-list"></ul>
      <ul id="task-list"></ul>
      <p class="counter">Всего задач: <span id="count">0</span></p>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
